name: Scrape flight prices (Aerolineas)

on:
  schedule:
    # 8x/day (every 3h). Aerolineas is a short, low-risk job: it deep-links to
    # the flex-dates calendar and intercepts the public offers API (one call
    # per month), no form-filling. Minute offset (:13) avoids GitHub's
    # top-of-the-hour scheduling congestion (see scrape.yml for details).
    - cron: "13 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-aerolineas
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Random jitter before scraping
        if: github.event_name == 'schedule'
        run: |
          SLEEP_SECONDS=$(( RANDOM % 600 ))
          echo "Sleeping ${SLEEP_SECONDS}s before starting"
          sleep "$SLEEP_SECONDS"

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PABLO_EMAIL: ${{ secrets.PABLO_EMAIL }}
          DAVID_EMAIL: ${{ secrets.DAVID_EMAIL }}
          IS_TEST_RUN: ${{ github.event_name == 'workflow_dispatch' }}
          SITES: aerolineas
          EMAIL_MODE: alerts
        run: node index.js

      - name: Commit results
        run: |
          git config user.name "vuelos-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices/ data/resumen-pablo.csv data/resumen-david.csv data/alerts-state.json docs/data/
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          git commit -m "Actualiza precios (aerolineas) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # See scrape.yml: rebase-and-retry against concurrent pushes from
          # the Gol workflow; CSV partitions union-merge, regenerated files
          # keep our version and self-heal on the next run.
          for i in 1 2 3; do
            git push && exit 0
            git fetch origin master
            git rebase -X theirs origin/master
          done
          git push
