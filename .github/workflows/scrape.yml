name: Scrape flight prices

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-flight-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Random jitter before scraping
        if: github.event_name == 'schedule'
        run: |
          SLEEP_SECONDS=$(( RANDOM % 1200 ))
          echo "Sleeping ${SLEEP_SECONDS}s before starting"
          sleep "$SLEEP_SECONDS"

      - name: Run scraper
        run: node index.js

      - name: Commit results
        run: |
          git config user.name "vuelos-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.csv
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          git commit -m "Actualiza precios $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
