name: Scrape flight prices

on:
  schedule:
    # UTC times chosen so runs land at ~06:00, ~14:00, ~22:00 Argentina time
    # (ART = UTC-3); actual delivery is a bit later due to the jitter sleep
    # below plus scraping time.
    - cron: "0 9 * * *"
    - cron: "0 17 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-flight-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Random jitter before scraping
        if: github.event_name == 'schedule'
        run: |
          SLEEP_SECONDS=$(( RANDOM % 1200 ))
          echo "Sleeping ${SLEEP_SECONDS}s before starting"
          sleep "$SLEEP_SECONDS"

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          IS_TEST_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: node index.js

      - name: Commit results
        run: |
          git config user.name "vuelos-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.csv data/resumen-pablo.csv data/resumen-david.csv
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          git commit -m "Actualiza precios $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
