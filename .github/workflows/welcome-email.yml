name: Send welcome email

on:
  workflow_dispatch:
    inputs:
      person:
        description: "Persona a dar de alta (pablo, david o jessica)"
        required: true
        type: choice
        options:
          - pablo
          - david
          - jessica

permissions:
  contents: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Rebuild summaries and send welcome email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PABLO_EMAIL: ${{ secrets.PABLO_EMAIL }}
          DAVID_EMAIL: ${{ secrets.DAVID_EMAIL }}
          JESSICA_EMAIL: ${{ secrets.JESSICA_EMAIL }}
          PERSON: ${{ inputs.person }}
        run: |
          node -e "
            const { buildSummaries } = require('./lib/summary');
            const { sendWelcomeEmail } = require('./lib/email');
            buildSummaries();
            sendWelcomeEmail(process.env.PERSON).then(() => console.log('Listo')).catch((err) => { console.error(err); process.exit(1); });
          "

      - name: Commit welcomed marker (if changed)
        run: |
          git config user.name "vuelos-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/welcomed-*.json
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          git commit -m "Marca el email de bienvenida como enviado ($PERSON)"
          git push
        env:
          PERSON: ${{ inputs.person }}
